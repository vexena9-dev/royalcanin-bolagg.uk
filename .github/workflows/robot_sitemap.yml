name: Search Console Sitemap Robot

on:
  schedule:
    - cron: '0 0 * * *' # Robot jalan otomatis setiap jam 12 malam
  workflow_dispatch: # Tombol agar Anda bisa jalankan manual kapan saja

jobs:
  check-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          pip install google-api-python-client google-auth

      - name: Jalankan Robot SEO
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python main.py
